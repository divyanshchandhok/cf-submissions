      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <rect width="798" height="338" x="1" y="1" rx="12" fill="#0d1117" stroke="url(#border-glow)" stroke-width="1.5" />
